<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم — هوجاس</title>
    <style>
        @font-face {
            font-family: 'HrofFont';
            src: url('حروف.ttf') format('truetype');
        }

        :root {
            --purple-bg: #6B3FA0;
            --yellow-main: #FFD600;
            --red-del: #ff4757;
            --green-ok: #2ecc71;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'HrofFont', sans-serif;
            background-color: #f0f4f8;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 2px, transparent 2px);
            background-size: 40px 40px;
            color: #000;
            min-height: 100vh;
        }

        /* شاشة الدخول */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--purple-bg);
        }

        .login-card {
            background: #fff;
            border: 4px solid #000;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 10px 10px 0 #000;
            text-align: center;
        }

        .login-card h2 {
            font-size: 3rem;
            color: var(--yellow-main);
            -webkit-text-stroke: 2px #000;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 25px;
        }

        /* الهيدر */
        nav {
            background: #fff;
            border-bottom: 4px solid #000;
            padding: 0 40px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-title {
            font-size: 2rem;
            color: #000;
            -webkit-text-stroke: 1px #000;
            text-shadow: 2px 2px 0 var(--yellow-main);
        }

        .btn-logout {
            background: var(--red-del);
            color: #fff;
            border: 3px solid #000;
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'HrofFont', sans-serif;
            box-shadow: 4px 4px 0 #000;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #fff;
            border: 4px solid #000;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 8px 8px 0 #000;
        }

        .stat-num {
            font-size: 3.5rem;
            color: #000;
            text-shadow: 2px 2px 0 #eee;
            line-height: 1;
        }

        .stat-lbl {
            font-size: 1.2rem;
            color: #666;
            margin-top: 10px;
        }

        /* الأقسام */
        .section {
            background: #fff;
            border: 4px solid #000;
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 10px 10px 0 #000;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 25px;
            border-bottom: 4px solid #000;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 3px solid #000;
            border-radius: 12px;
            font-family: 'HrofFont', sans-serif;
            font-size: 1.1rem;
            outline: none;
        }

        .btn-main {
            background: var(--yellow-main);
            color: #000;
            border: 3px solid #000;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'HrofFont', sans-serif;
            font-size: 1.1rem;
            box-shadow: 4px 4px 0 #000;
        }

        .btn-main:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        /* الجدول */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: right;
            padding: 15px;
            border-bottom: 3px solid #000;
            background: #fafafa;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 8px;
            border: 2px solid #000;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .status-on {
            background: var(--green-ok);
            color: #fff;
        }

        .status-off {
            background: #bdc3c7;
            color: #000;
        }

        .btn-del {
            background: var(--red-del);
            color: #fff;
            border: 2px solid #000;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            border: 2px solid #000;
        }

        .success {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        .error {
            display: block;
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

    <div id="adminLogin" class="login-screen">
        <div class="login-card">
            <h2>لوحة المدير</h2>
            <input type="password" id="adminSecret" placeholder="أدخل كلمة السر"
                style="text-align:center; margin-bottom:20px;" />
            <button class="btn-main" style="width:100%" onclick="adminLogin()">دخول الإدارة</button>
            <div id="loginErr" class="result-box error"></div>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <nav>
            <span class="nav-title">إدارة تراخيص هوجاس</span>
            <button class="btn-logout" onclick="location.reload()">خروج آمن</button>
        </nav>

        <div class="page">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-num" id="s-total">0</span>
                    <span class="stat-lbl">إجمالي المسجلين</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="s-activated" style="color:var(--green-ok)">0</span>
                    <span class="stat-lbl">نشط (دخل اللعبة)</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="s-pending" style="color:#e67e22">0</span>
                    <span class="stat-lbl">مسجل (لم يدخل بعد)</span>
                </div>
            </div>

            <div class="section">
                <div class="section-title">إضافة / تفعيل يدوي</div>
                <p style="margin-bottom:15px; color:#666;">يمكنك هنا إضافة أرقام الأصدقاء أو تفعيل العملاء يدوياً في
                    حالات الطوارئ.</p>
                <div class="form-grid">
                    <div class="input-group">
                        <input type="text" id="newUsername" placeholder="الاسم (مثال: راكان)" />
                    </div>
                    <div class="input-group">
                        <input type="text" id="newPhone" placeholder="رقم الجوال (05xxxxxxxx)" />
                    </div>
                    <button class="btn-main" onclick="addUser()">تفعيل الرقم +</button>
                </div>
                <div id="actionResult" class="result-box"></div>
            </div>

            <div class="section">
                <div class="section-title">قائمة التراخيص والتحكم</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>رقم الجوال</th>
                                <th>الحالة</th>
                                <th>تاريخ الانضمام</th>
                                <th>إجراءات (حظر/حذف)</th>
                            </tr>
                        </thead>
                        <tbody id="userTable">
                            <tr>
                                <td colspan="5" style="text-align:center">جاري جلب البيانات...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSecret = '';

        function adminLogin() {
            const secret = document.getElementById('adminSecret').value;
            currentSecret = secret;
            loadDashboard();
        }

        async function loadDashboard() {
            try {
                const resp = await fetch('/api/admin/stats', {
                    headers: { 'x-admin-secret': currentSecret }
                });
                if (!resp.ok) throw new Error('كلمة السر خاطئة!');

                const stats = await resp.json();
                document.getElementById('s-total').textContent = stats.total;
                document.getElementById('s-activated').textContent = stats.activated;
                document.getElementById('s-pending').textContent = stats.pending;

                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

                loadUsers();
            } catch (err) {
                const box = document.getElementById('loginErr');
                box.textContent = err.message;
                box.style.display = 'block';
            }
        }

        async function loadUsers() {
            const resp = await fetch('/api/admin/users', {
                headers: { 'x-admin-secret': currentSecret }
            });
            const users = await resp.json();
            const tbody = document.getElementById('userTable');

            tbody.innerHTML = users.length ? users.map(u => `
            <tr>
                <td><b>${u.username}</b></td>
                <td><span style="color:#2980b9; font-weight:bold;">${u.phone}</span></td>
                <td><span class="badge ${u.isActivated ? 'status-on' : 'status-off'}">${u.isActivated ? 'نشط' : 'معلق'}</span></td>
                <td style="font-size:0.9rem; color:#666;">${new Date(u.createdAt).toLocaleDateString('ar')}</td>
                <td><button class="btn-del" onclick="deleteUser('${u.username}')">إلغاء الترخيص</button></td>
            </tr>
        `).join('') : '<tr><td colspan="5" style="text-align:center">لا يوجد عملاء مسجلين حالياً.</td></tr>';
        }

        async function addUser() {
            const username = document.getElementById('newUsername').value.trim();
            const phone = document.getElementById('newPhone').value.trim();
            const resBox = document.getElementById('actionResult');

            if (!phone) return alert('يجب إدخال رقم الجوال');

            const resp = await fetch('/api/admin/add-user', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-secret': currentSecret
                },
                body: JSON.stringify({ username, phone })
            });

            const data = await resp.json();
            if (resp.ok) {
                resBox.textContent = data.message;
                resBox.className = 'result-box success';
                loadDashboard(); // تحديث الإحصائيات والقائمة
                document.getElementById('newUsername').value = '';
                document.getElementById('newPhone').value = '';
            } else {
                resBox.textContent = data.error;
                resBox.className = 'result-box error';
            }
        }

        async function deleteUser(username) {
            if (!confirm(`هل أنت متأكد من إلغاء ترخيص وحذف العميل ${username}؟ لن يتمكن من الدخول للعبة.`)) return;
            await fetch(`/api/admin/user/${username}`, {
                method: 'DELETE',
                headers: { 'x-admin-secret': currentSecret }
            });
            loadDashboard();
        }

        // الدخول بضغط مفتاح Enter
        document.getElementById('adminSecret').addEventListener('keydown', e => {
            if (e.key === 'Enter') adminLogin();
        });
    </script>

</body>

</html>
